<!doctype html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      ShriSSSSanstha | NGO in Maharashtra for Education, Healthcare & Social
      Welfare
    </title>

    <meta
      name="description"
      content="ShriSSSSanstha is a trusted NGO in Maharashtra working for education, healthcare, women empowerment, child welfare, disaster relief, rural development, and community support. Join us to create positive social impact."
    />

    <meta
      name="keywords"
      content="Shri SSS Sanstha Bhoom, NGO Bhoom, donate to help, ShriSSSSanstha"
    />
    <meta name="author" content="ShriSSSSanstha" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Theme -->
    <meta name="theme-color" content="#2E7D32" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.shrissssanstha.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="ShriSSSSanstha | Empowering Lives, Building Futures"
    />
    <meta
      property="og:description"
      content="Empowering communities through education, healthcare, social welfare, disaster relief, and volunteer initiatives across Maharashtra."
    />
    <meta
      property="og:image"
      content="https://www.shrissssanstha.com/og-image.jpg"
    />
    <meta property="og:url" content="https://www.shrissssanstha.com/" />
    <meta property="og:site_name" content="ShriSSSSanstha" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShriSSSSanstha | NGO in Maharashtra" />
    <meta
      name="twitter:description"
      content="Supporting education, healthcare, women empowerment, disaster relief, and social welfare initiatives."
    />
    <meta
      name="twitter:image"
      content="https://www.shrissssanstha.com/og-image.jpg"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "NGO",
        "name": "ShriSSSSanstha",
        "url": "https://www.shrissssanstha.com",
        "logo": "https://www.shrissssanstha.com/logo.png",
        "description": "ShriSSSSanstha is a Maharashtra-based NGO focused on education, healthcare, social welfare, rural development, women empowerment, and disaster relief.",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Maharashtra",
          "addressCountry": "India"
        },
        "sameAs": [
          "https://www.facebook.com/",
          "https://www.instagram.com/",
          "https://www.linkedin.com/"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
